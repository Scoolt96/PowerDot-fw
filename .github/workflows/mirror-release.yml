name: Mirror release assets to repo

on:
  release:
    types: [published]

jobs:
  mirror:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download release assets
        run: |
          TAG="${{ github.event.release.tag_name }}"
          mkdir -p "firmware/$TAG"
          gh release download "$TAG" --dir "firmware/$TAG" --pattern "*.bin"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Commit firmware files
        run: |
          TAG="${{ github.event.release.tag_name }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add firmware/
          git diff --staged --quiet || git commit -m "Mirror firmware $TAG assets for flash tool"
          git push
